{% extends 'base.html' %}

{% block title %}Delete Review | Filma AI Portraits{% endblock %}

{% block content %}
<section>
    <h2>Delete review</h2>
    <p>Are you sure you want to delete this review?</p>
    <article class="gallery-card">
        <p><strong>Rating:</strong> {{ review.rating }}/5</p>
        <p>{{ review.comment }}</p>
    </article>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-primary">Yes, delete</button>
        <a class="btn-secondary" href="{% url 'edit_review' review.pk %}">Cancel</a>
    </form>
</section>
{% endblock %}
