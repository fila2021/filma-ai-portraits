{% extends 'base.html' %}

{% block title %}Delete Request | Filma AI Portraits{% endblock %}

{% block content %}
<section>
    <h2>Delete Custom Request</h2>
    <p>Are you sure you want to delete this request?</p>
    <p><strong>{{ custom_request.package.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <p><a href="{% url 'request_detail' custom_request.pk %}">Cancel</a></p>
</section>
{% endblock %}
