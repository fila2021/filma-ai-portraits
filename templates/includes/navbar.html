{% load static %}

<header class="site-header">
    <nav class="site-nav container">
        <a href="{% url 'home' %}" class="brand-link" aria-label="Askuala AI Portraits home">
            <img
                src="{% static 'img/askuala-logo.png' %}"
                alt="Askuala AI Portraits"
                class="logo logo-large"
            >
        </a>

        <ul class="nav-menu">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'gallery' %}">Gallery</a></li>
            <li><a href="{% url 'product_list' %}">Shop</a></li>
            <li><a href="{% url 'service_list' %}">Services</a></li>
            <li><a href="{% url 'about' %}">About</a></li>

            <li>
                <a href="{% url 'cart_view' %}" class="cart-nav-link" aria-label="View cart">
                    <span class="cart-nav-icon">🛒</span>
                    {% if cart_count > 0 %}
                        <span class="cart-nav-badge">{{ cart_count }}</span>
                    {% endif %}
                </a>
            </li>

            {% if user.is_authenticated %}
                <li><a href="{% url 'profile' %}">Profile</a></li>
                <li><a href="{% url 'request_list' %}">Requests</a></li>
                <li>
                    <form action="{% url 'logout' %}" method="post" class="nav-logout-form">
                        {% csrf_token %}
                        <button type="submit" class="nav-btn nav-btn-outline">Logout</button>
                    </form>
                </li>
            {% else %}
                <li><a href="{% url 'signup' %}" class="nav-btn nav-btn-outline">Sign Up</a></li>
                <li><a href="{% url 'login' %}" class="nav-btn nav-btn-solid">Login</a></li>
            {% endif %}

            <li>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">☼</button>
            </li>
        </ul>
    </nav>
</header>
